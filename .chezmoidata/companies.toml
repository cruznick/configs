# Company work identities.
# Each entry drives: git includeIf, SSH host aliases, glab routing.
#
# Add a new company:
#   1. Add an entry here (platforms = ["gh"] or ["gl", "gh"])
#   2. Create dot_gitconfig-work-<slug>-<platform>.tmpl files
#   3. If using GitLab: add a [[ssh-keys]] entry to dot_config/1Password/ssh/agent.toml.tmpl
#   4. Commit and push → chezmoi update on all machines

[companies.kavak]
  slug          = "kavak"
  platforms     = ["gl", "gh"]
  # ssh_key_prefix: name used in 1Password item: "ssh-sign-<prefix>-<platform>"
  # Existing items are named "ssh-sign-work-gl/gh" — keep "work" for backwards compat.
  # New companies use their slug directly (e.g. "birdie" → "ssh-sign-birdie-gh")
  ssh_key_prefix = "work"

# Future companies — uncomment and fill in when needed
# [companies.birdie]
#   slug           = "birdie"
#   platforms      = ["gh"]
#   ssh_key_prefix = "birdie"
